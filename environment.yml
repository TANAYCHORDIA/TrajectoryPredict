# TrajectoryPredict — Local development environment (Data Engineer / VSCode)
# ─────────────────────────────────────────────────────────────────
# This file is for LOCAL SETUP ONLY.
# Kaggle users do not use this file — use requirements.txt instead.
#
# Setup steps:
#   1. conda env create -f environment.yml
#   2. conda activate trajpredict
#   3. pip install --no-cache-dir torch==2.11.0 torchvision==0.26.0 torchaudio==2.11.0
#   4. pip install --no-cache-dir -r requirements.txt
#
# Note: torch is installed manually after conda setup, not through this file.
# The conda pytorch channel does not have 2.11.0. pip handles it directly.
# ─────────────────────────────────────────────────────────────────

name: trajpredict
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy=1.26.4
  - pip